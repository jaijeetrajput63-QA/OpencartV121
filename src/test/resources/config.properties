<Configuration status="INFO">

<properties>
    <property>name="logs">./logs</property>
</properties>


    <Appenders>
        <Console name="Console" target="SYSTEM_OUT">
        <PatternLayout pattern="%d{HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n"/>
        </Console>

        <RollingFile name="File" fileName="logs/automation.log" filePattern="logs/automation-%d{yyyy-MM-dd}.log.">
        <PatternLayout pattern="%d{HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n"/>
        <SizeBasedTriggeringPolicy size="5000" />	
        </RollingFile>

    </Appenders>

    <Loggers>
        <Root level="Debug"><!-- Here you can use multiple log levels All < Trace < Debug < Info < Warning < Error < Fatal < Off -->
           <!-- <AppenderRef ref="Console"/> -->
           <AppenderRef ref="File"/>
        </Root>
    </Loggers>

</Configuration>